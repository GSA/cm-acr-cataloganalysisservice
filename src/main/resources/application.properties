server.port=7200
server.servlet.context-path=/acr

# r2dbc properties
spring.r2dbc.url=r2dbc:postgresql://${PG_URL}/${PG_DB}
spring.r2dbc.username=${PG_USER}
spring.r2dbc.password=${PG_PWD}
spring.r2dbc.pool.initial-size=100
spring.r2dbc.pool.max-size=500
spring.r2dbc.pool.max-idle-time=30m
spring.r2dbc.pool.validation-query=SELECT 1
#logging.level.io.r2dbc.postgresql.QUERY=DEBUG
#logging.level.io.r2dbc.postgresql.PARAM=DEBUG

xsb.report.file.delimiter=\\~\\|\\~

# Error handler properties
error.file.size.max.bytes.per.file=10485760
error.file.directory=testData/errors
error.threshold = 8000000

# This next property (spring.mvc.async.request-timeout) is needed otherwise  any long-running transaction
# makes the web client timeout
#spring.mvc.async.request-timeout = -1

